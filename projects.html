<!DOCTYPE html>
<html lang="en" data-theme="ivory">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneSetter — My Projects</title>
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.google-analytics.com https://*.googletagmanager.com; connect-src 'self' https://formspree.io https://*.google-analytics.com https://*.analytics.google.com https://*.googletagmanager.com; object-src 'none'; base-uri 'self'; form-action 'self'">
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NNVHKFSNPG"></script>
<script src="ga.js"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ PROJECT MANAGER ════════════════════════════════════════════════════════ -->
<div id="proj-mgr" style="display:flex">
  <div class="pm-hdr">
    <h1>📝 SceneSetter</h1>
    <span class="pm-sub">My Projects</span>
    <div class="pm-hdr-right">
      <a href="index.html" class="landing-nav-link" style="font-size:12px">Home</a>
      <a href="tutorial.html" class="landing-nav-link" style="font-size:12px">Tutorial</a>
    </div>
  </div>
  <div class="pm-body">
    <div class="pm-inner">
      <div class="pm-toolbar">
        <button class="pm-btn pm-btn-primary" id="pm-new-project-btn">+ New Project</button>
        <button class="pm-btn pm-btn-secondary" id="pm-import-btn">Import project (JSON file)</button>
        <input type="file" id="proj-import-input" accept=".json" style="display:none">
        <a href="tutorial.html#data-backups" target="_blank" rel="noopener" class="pm-help-link">Learn about your data and backups</a>
      </div>
      <div id="proj-grid" class="pm-grid"></div>
    </div>
  </div>
</div>

<!-- New project modal -->
<div id="proj-new-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="proj-new-title">
  <div class="pm-modal-box">
    <div class="pm-modal-title" id="proj-new-title">New Project</div>
    <input type="text" id="proj-new-input" class="pm-modal-input" placeholder="Project name" maxlength="80">
    <div class="pm-modal-btns">
      <button class="pm-btn pm-btn-secondary" id="proj-new-cancel-btn">Cancel</button>
      <button class="pm-btn pm-btn-primary" id="proj-new-create-btn">Create</button>
    </div>
  </div>
</div>

<!-- Project rename modal -->
<div id="proj-rename-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="proj-rename-title">
  <div class="pm-modal-box">
    <div class="pm-modal-title" id="proj-rename-title">Rename Project</div>
    <input type="text" id="proj-rename-input" class="pm-modal-input" placeholder="Project name" maxlength="80">
    <div class="pm-modal-btns">
      <button class="pm-btn pm-btn-secondary" id="proj-rename-cancel-btn">Cancel</button>
      <button class="pm-btn pm-btn-primary" id="proj-rename-save-btn">Save</button>
    </div>
  </div>
</div>

<!-- Project delete modal -->
<div id="proj-del-modal" class="pm-modal" role="dialog" aria-modal="true" aria-labelledby="proj-del-title">
  <div class="pm-modal-box">
    <div class="pm-modal-title" id="proj-del-title">Delete Project</div>
    <div class="pm-modal-del-msg">Are you sure you want to delete <span id="proj-del-name" class="pm-modal-del-name"></span>? This cannot be undone.</div>
    <div class="pm-modal-btns">
      <button class="pm-btn pm-btn-secondary" id="proj-del-cancel-btn">Cancel</button>
      <button class="pm-btn pm-btn-primary" style="background:var(--rd)" id="proj-del-confirm-btn">Delete</button>
    </div>
  </div>
</div>

<script src="config.js"></script>
<script src="tracking.js"></script>
<script src="state.js"></script>
<script src="ui.js"></script>
<script src="projects.js"></script>
<script src="main.js"></script>
<script src="app.js"></script>
<script src="projects-init.js"></script>
</body>
</html>
