<!DOCTYPE html>
<html lang="en" data-theme="ivory">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SceneSetter — My Projects</title>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-NNVHKFSNPG"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-NNVHKFSNPG', {
    'anonymize_ip': true,
    'allow_google_signals': false,
    'allow_ad_personalization_signals': false
  });
</script>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ══ PROJECT MANAGER ════════════════════════════════════════════════════════ -->
<div id="proj-mgr" style="display:flex">
  <div class="pm-hdr">
    <h1>📝 SceneSetter</h1>
    <span class="pm-sub">My Projects</span>
    <div class="pm-hdr-right">
      <a href="index.html" class="landing-nav-link" style="font-size:12px">Home</a>
      <a href="overview.html" class="landing-nav-link" style="font-size:12px">Overview</a>
      <a href="tutorial.html" class="landing-nav-link" style="font-size:12px">Tutorial</a>
    </div>
  </div>
  <div class="pm-body">
    <div class="pm-inner">
      <div class="pm-toolbar">
        <button class="pm-btn pm-btn-primary" onclick="createAndOpenProject()">+ New Project</button>
        <button class="pm-btn pm-btn-secondary" onclick="document.getElementById('proj-import-input').click()">Import JSON</button>
        <input type="file" id="proj-import-input" accept=".json" style="display:none" onchange="importProjectJSON(this)">
      </div>
      <div id="proj-grid" class="pm-grid"></div>
    </div>
  </div>
</div>

<!-- Project rename modal -->
<div id="proj-rename-modal" class="pm-modal">
  <div class="pm-modal-box">
    <div class="pm-modal-title">Rename Project</div>
    <input type="text" id="proj-rename-input" class="pm-modal-input" placeholder="Project name" maxlength="80">
    <div class="pm-modal-btns">
      <button class="pm-btn pm-btn-secondary" onclick="closeProjRename()">Cancel</button>
      <button class="pm-btn pm-btn-primary" onclick="confirmProjRename()">Save</button>
    </div>
  </div>
</div>

<!-- Project delete modal -->
<div id="proj-del-modal" class="pm-modal">
  <div class="pm-modal-box">
    <div class="pm-modal-title">Delete Project</div>
    <div class="pm-modal-del-msg">Are you sure you want to delete <span id="proj-del-name" class="pm-modal-del-name"></span>? This cannot be undone.</div>
    <div class="pm-modal-btns">
      <button class="pm-btn pm-btn-secondary" onclick="closeProjDel()">Cancel</button>
      <button class="pm-btn pm-btn-primary" style="background:var(--rd)" onclick="confirmProjDel()">Delete</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
